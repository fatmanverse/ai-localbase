version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: ai-localbase-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ai-localbase-backend
    restart: unless-stopped
    depends_on:
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8080"
      UPLOAD_DIR: data/uploads
      STATE_FILE: data/app-state.json
      CHAT_HISTORY_FILE: data/chat-history.db
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_PREFIX: kb_
      QDRANT_VECTOR_SIZE: "768"
      QDRANT_DISTANCE: Cosine
      QDRANT_TIMEOUT_SECONDS: "5"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
    container_name: ai-localbase-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "4173:4173"
